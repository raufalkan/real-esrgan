build:
  gpu: true
  cuda: "11.8"
  python_version: "3.10"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"
  python_packages:
    - "torch==2.1.0"
    - "torchvision==0.16.0"
    - "numpy<2"
    - "scipy"
    - "Pillow"
    - "opencv-python-headless"
    - "tqdm"
    - "pyyaml"
    - "lmdb"
    - "yapf"
    - "addict"
    - "future"
    - "basicsr==1.4.2"
    - "facexlib==0.3.0"
    - "gfpgan==1.3.8"

  run:
    - "mkdir -p /src/weights"
    - "curl -L https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth -o /src/weights/RealESRGAN_x4plus.pth"

predict: "cog_predict.py:Predictor"