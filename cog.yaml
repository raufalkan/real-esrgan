build:
  gpu: true
  cuda: "11.8"
  python_version: "3.10"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"

  run:
    - "pip install torch==2.0.1+cu118 torchvision==0.15.2+cu118 --extra-index-url https://download.pytorch.org/whl/cu118"
    - "pip install basicsr==1.4.2 facexlib==0.3.0 gfpgan==1.3.8"
    - "pip install numpy==1.24.4 opencv-python-headless==4.8.1.78 Pillow==10.0.1 scipy==1.11.4 tqdm==4.66.1 pyyaml lmdb yapf"
    - "pip install -e /src"
    - "mkdir -p /src/weights"
    - "curl -L https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth -o /src/weights/RealESRGAN_x4plus.pth"
    - "curl -L https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-animevideov3.pth -o /src/weights/realesr-animevideov3.pth"

predict: "cog_predict.py:Predictor"