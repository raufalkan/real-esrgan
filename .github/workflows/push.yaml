mkdir -p .github/workflows
cat > .github/workflows/push.yml << 'EOF'
name: Push to Replicate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install COG
        run: |
          sudo curl -fsSL -o /usr/local/bin/cog \
            https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Replicate
        run: cog login --token ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Push to Replicate
        run: cog push r8.im/${{ secrets.REPLICATE_USERNAME }}/real-esrgan
EOF